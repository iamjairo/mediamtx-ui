networks:
  camnet:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  recordings:

services:

  # ─── MediaMTX Streaming Server ────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:${MEDIAMTX_VERSION:-latest-ffmpeg}
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "${RTSP_PORT:-8554}:${RTSP_PORT:-8554}"
      - "${RTMP_PORT:-1935}:${RTMP_PORT:-1935}"
      - "${WEBRTC_UDP_PORT:-8189}:${WEBRTC_UDP_PORT:-8189}/udp"
    expose:
      - "${HLS_PORT:-8888}"
      - "${WEBRTC_PORT:-8889}"
      - "${API_PORT:-9997}"
      - "${METRICS_PORT:-9998}"
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro
      - ./media:/media
      - recordings:/recordings
    networks:
      - camnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${API_PORT:-9997}/v3/paths/list"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Dashboard UI ─────────────────────────────────────────
  mediamtxui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PROJECT_NAME:-mediamtxui}
    container_name: ${PROJECT_NAME:-mediamtxui}
    restart: unless-stopped
    expose:
      - "${SERVER_PORT:-3000}"
    volumes:
      - recordings:/recordings:ro
    environment:
      - NODE_ENV=production
      - SERVER_PORT=${SERVER_PORT:-3000}
      - RTSP_PORT=${RTSP_PORT:-8554}
      - HLS_PORT=${HLS_PORT:-8888}
      - WEBRTC_PORT=${WEBRTC_PORT:-8889}
      - WEBRTC_UDP_PORT=${WEBRTC_UDP_PORT:-8189}
      - API_PORT=${API_PORT:-9997}
      - MEDIAMTX_API_URL_BASE=http://mediamtx:9997/v3
      - MEDIAMTX_METRICS_URL_BASE=http://mediamtx:9998/metrics
      - HW_ACCEL=${HW_ACCEL:-none}
      - RECORDING_PATH=/recordings
    networks:
      - camnet
    depends_on:
      mediamtx:
        condition: service_healthy

  # ─── Caddy Reverse Proxy ──────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - camnet
    depends_on:
      - mediamtxui
      - mediamtx
