networks:
  camnet:
    driver: bridge

services:

  mediamtx:
    image: bluenviron/mediamtx:${MEDIAMTX_VERSION:-latest-ffmpeg}
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "${HLS_PORT:-8888}:${HLS_PORT:-8888}"
      - "${RTSP_PORT:-8554}:${RTSP_PORT:-8554}"
      - "${RTMP_PORT:-1935}:${RTMP_PORT:-1935}"
      - "${WEBRTC_PORT:-8889}:${WEBRTC_PORT:-8889}"
      - "${WEBRTC_UDP_PORT:-8189}:${WEBRTC_UDP_PORT:-8189}/udp"
      - "${METRICS_PORT:-9998}:${METRICS_PORT:-9998}"
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml:ro
      - ./media:/media
      - ${RECORDING_PATH:-./recordings}:/recordings
    networks:
      - camnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:${API_PORT:-9997}/v3/paths/list"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
